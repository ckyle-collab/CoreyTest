- hosts: all
  become: true
  gather_facts: false
  tasks:
    - name: Apply timesync via wrapper
      ansible.builtin.include_role:
        name: infra.ado.rhel_ext_system_roles
      vars:
        sr_apply:
          - timesync
        sr_vars:
          timesync:
            timesync_ntp_servers:
              - hostname: 2.rhel.pool.ntp.org
                iburst: true